{% extends "sqladmin_original/base.html" %}

{% block head %}
{{ super() }}
<style>
  /* ── Evrest Market Admin Panel – Slate & Steel palette ── */

  :root {
    --em-navy:       #1a2540;
    --em-navy-mid:   #243050;
    --em-navy-light: #2d3d63;
    --em-steel:      #4a6fa5;
    --em-steel-dark: #3a5a8a;
    --em-steel-light:#6389b8;
    --em-bg:         #f0f4f8;
    --em-card:       #ffffff;
    --em-border:     #dce4ee;
    --em-text:       #2d3748;
    --em-muted:      #718096;
    --em-success:    #3a7d5c;
    --em-danger:     #b94040;
    --tblr-primary:         #4a6fa5;
    --tblr-primary-rgb:     74,111,165;
    --tblr-body-bg:         #f0f4f8;
    --tblr-body-color:      #2d3748;
    --tblr-border-color:    #dce4ee;
    --tblr-card-bg:         #ffffff;
    --tblr-card-border-color: #dce4ee;
  }

  /* ── Sidebar / Navbar ── */
  .navbar.navbar-vertical.navbar-dark,
  .navbar-vertical.navbar-dark {
    background: var(--em-navy) !important;
    border-right: 1px solid var(--em-navy-light) !important;
    box-shadow: 2px 0 12px rgba(0,0,0,0.18);
  }

  .navbar-dark .navbar-brand h3,
  .navbar-brand h3 {
    color: #e8edf5 !important;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 0.4px;
    margin: 0;
    line-height: 1.4;
  }

  .navbar-dark .navbar-nav .nav-link,
  .navbar-vertical .nav-link {
    color: #94a8c8 !important;
    border-radius: 6px;
    margin: 1px 8px;
    padding: 6px 10px;
    transition: all 0.15s ease;
  }

  .navbar-dark .navbar-nav .nav-link:hover,
  .navbar-vertical .nav-link:hover {
    color: #e8edf5 !important;
    background: rgba(255,255,255,0.09) !important;
  }

  .navbar-dark .navbar-nav .nav-link.active,
  .navbar-vertical .nav-link.active,
  .navbar-dark .navbar-nav .active > .nav-link {
    color: #e8edf5 !important;
    background: var(--em-steel) !important;
  }

  .navbar-dark .nav-link svg,
  .navbar-vertical .nav-link i {
    color: inherit !important;
    opacity: 0.85;
  }

  /* Sidebar section headings */
  .navbar-dark .navbar-heading,
  .navbar-vertical .navbar-heading {
    color: #5a7299 !important;
    text-transform: uppercase;
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    padding: 12px 18px 4px;
  }

  /* Logout button */
  .navbar-dark .btn-secondary {
    background: var(--em-navy-light) !important;
    border-color: transparent !important;
    color: #94a8c8 !important;
    font-size: 0.85rem;
  }
  .navbar-dark .btn-secondary:hover {
    background: var(--em-steel) !important;
    color: #fff !important;
  }

  /* ── Page / content area ── */
  .page-wrapper {
    background: var(--em-bg);
  }

  .page-header {
    border-bottom: 1px solid var(--em-border);
    padding-bottom: 12px;
    margin-bottom: 0;
    background: #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }

  h2.page-title {
    color: var(--em-text);
    font-weight: 600;
    font-size: 1.1rem;
  }

  .page-pretitle {
    color: var(--em-muted);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* ── Cards ── */
  .card {
    background: var(--em-card);
    border: 1px solid var(--em-border) !important;
    border-radius: 10px !important;
    box-shadow: 0 1px 3px rgba(20,30,60,0.04), 0 2px 8px rgba(20,30,60,0.05) !important;
    transition: box-shadow .18s ease, transform .18s ease, border-color .18s ease;
  }
  .card:hover {
    box-shadow: 0 4px 12px rgba(20,30,60,0.08), 0 10px 28px rgba(20,30,60,0.06) !important;
    border-color: #c8d4ea !important;
  }
  .card-header {
    background: linear-gradient(180deg, #fbfcfe 0%, #f5f8fc 100%);
    border-bottom: 1px solid var(--em-border);
    padding: 13px 18px;
    font-weight: 600;
  }
  .card-body { padding: 18px; }

  /* ── Buttons ── */
  .btn-primary {
    background: var(--em-steel) !important;
    border-color: var(--em-steel) !important;
    color: #fff !important;
    font-weight: 500;
    border-radius: 6px;
  }
  .btn-primary:hover,
  .btn-primary:focus {
    background: var(--em-steel-dark) !important;
    border-color: var(--em-steel-dark) !important;
    box-shadow: 0 2px 8px rgba(74,111,165,0.35) !important;
  }

  .btn-secondary {
    background: #edf2f7 !important;
    border-color: var(--em-border) !important;
    color: var(--em-text) !important;
    border-radius: 6px;
  }
  .btn-secondary:hover {
    background: #dde6f0 !important;
  }

  .btn-danger {
    background: var(--em-danger) !important;
    border-color: var(--em-danger) !important;
    border-radius: 6px;
  }

  .btn-success {
    background: var(--em-success) !important;
    border-color: var(--em-success) !important;
    border-radius: 6px;
  }

  /* ── Tables ── */
  .table {
    --tblr-table-bg: transparent;
    margin-bottom: 0;
  }
  .table th {
    background: #f7f9fc;
    color: var(--em-muted);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 700;
    border-bottom: 2px solid var(--em-border) !important;
    padding: 11px 14px;
    white-space: nowrap;
  }
  .table td {
    color: var(--em-text);
    vertical-align: middle;
    border-color: #edf2f7 !important;
    font-size: 0.875rem;
    padding: 12px 14px;
    line-height: 1.45;
  }
  .table tbody tr {
    transition: background .12s ease, box-shadow .12s ease;
  }
  .table-hover tbody tr:hover {
    background: #eef4fc;
    box-shadow: inset 3px 0 0 var(--em-steel);
  }
  .table tbody tr:nth-of-type(odd) > * {
    background-color: rgba(247, 249, 252, 0.55);
  }
  .table-responsive {
    border-radius: 0 0 10px 10px;
    overflow: hidden;
  }

  /* ── Tabs / Nav-tabs ── */
  .nav-tabs {
    border-bottom: 1px solid var(--em-border);
    gap: 4px;
  }
  .nav-tabs .nav-link {
    color: var(--em-muted);
    border: 1px solid transparent;
    border-radius: 8px 8px 0 0;
    padding: 9px 16px;
    font-size: 0.85rem;
    font-weight: 500;
    transition: color .15s ease, background .15s ease, border-color .15s ease;
    position: relative;
  }
  .nav-tabs .nav-link:hover {
    color: var(--em-steel);
    background: #f3f7fc;
    border-color: transparent;
  }
  .nav-tabs .nav-link.active,
  .nav-tabs .nav-item.show .nav-link {
    color: var(--em-steel) !important;
    background: var(--em-card) !important;
    border-color: var(--em-border) var(--em-border) var(--em-card) !important;
    font-weight: 600;
  }
  .nav-tabs .nav-link.active::after {
    content: "";
    position: absolute;
    left: 12px; right: 12px; bottom: -1px;
    height: 2px;
    background: var(--em-steel);
    border-radius: 2px 2px 0 0;
  }

  /* ── Pills ── */
  .nav-pills .nav-link {
    color: var(--em-muted);
    border-radius: 6px;
    padding: 7px 14px;
    font-size: 0.85rem;
  }
  .nav-pills .nav-link.active {
    background: var(--em-steel) !important;
    color: #fff !important;
  }

  /* ── Forms ── */
  .form-control,
  .form-select {
    border-color: var(--em-border) !important;
    color: var(--em-text);
    border-radius: 6px;
    background: #fff;
    font-size: 0.875rem;
  }
  .form-control:focus,
  .form-select:focus {
    border-color: var(--em-steel) !important;
    box-shadow: 0 0 0 3px rgba(74,111,165,0.15) !important;
  }

  .form-label {
    color: var(--em-text);
    font-size: 0.82rem;
    font-weight: 500;
    margin-bottom: 4px;
  }

  /* ── Pagination ── */
  .page-link {
    color: var(--em-steel) !important;
    border-color: var(--em-border) !important;
    border-radius: 5px;
    margin: 0 2px;
  }
  .page-item.active .page-link {
    background: var(--em-steel) !important;
    border-color: var(--em-steel) !important;
    color: #fff !important;
  }

  /* ── Badges ── */
  .badge.bg-primary { background: var(--em-steel) !important; }
  .badge.bg-success { background: var(--em-success) !important; }
  .badge.bg-danger  { background: var(--em-danger) !important; }

  /* ── Breadcrumb ── */
  .breadcrumb-item + .breadcrumb-item::before { color: var(--em-muted); }
  .breadcrumb-item a { color: var(--em-steel); }
  .breadcrumb-item.active { color: var(--em-muted); }

  /* ── Scrollbar (webkit) ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #b0bfd4; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--em-steel); }

  /* ── Select2 ── */
  .select2-container--default .select2-selection--single,
  .select2-container--default .select2-selection--multiple {
    border-color: var(--em-border) !important;
    border-radius: 6px !important;
  }
  .select2-container--default .select2-results__option--highlighted {
    background: var(--em-steel) !important;
  }

  /* ── Image uploader widget ── */
  .em-upload-wrap {
    margin-top: 8px;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .em-upload-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    background: var(--em-steel);
    color: #fff !important;
    border-radius: 6px;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s ease;
    border: 0;
  }
  .em-upload-btn:hover { background: var(--em-steel-dark); }
  .em-upload-status { font-size: 0.78rem; color: var(--em-muted); }
  .em-upload-preview {
    width: 56px; height: 56px;
    object-fit: cover;
    border-radius: 6px;
    border: 1px solid var(--em-border);
    background: #f7f9fc;
  }
  .em-upload-status.is-error { color: var(--em-danger); }
  .em-upload-status.is-success { color: var(--em-success); }
</style>
{% endblock %}

{% block tail_js %}
{{ super() }}
<script>
(function(){
  function enhance(input){
    if (input.dataset.emEnhanced) return;
    input.dataset.emEnhanced = "1";

    // Hide the raw URL input so admins don't see (or edit) internal storage paths.
    input.type = "hidden";

    // Relabel the field group visually
    try {
      var formGroup = input.closest(".mb-3, .form-group, .row");
      if (formGroup) {
        var lbl = formGroup.querySelector("label");
        if (lbl) lbl.textContent = "Product Image";
        var help = formGroup.querySelector("small, .form-text");
        if (help) help.textContent = "Upload a product image (JPG/PNG/WEBP, max 2 MB, ~600×600 recommended).";
      }
    } catch(e){}

    var wrap = document.createElement("div");
    wrap.className = "em-upload-wrap";

    var preview = document.createElement("img");
    preview.className = "em-upload-preview";
    preview.alt = "";
    preview.style.display = input.value ? "block" : "none";
    if (input.value) preview.src = input.value;

    var label = document.createElement("label");
    label.className = "em-upload-btn";
    label.innerHTML = '<span style="font-size:14px;">📷</span> Upload image';

    var file = document.createElement("input");
    file.type = "file";
    file.accept = "image/png,image/jpeg,image/webp,image/gif";
    file.style.display = "none";
    label.appendChild(file);

    var removeBtn = document.createElement("button");
    removeBtn.type = "button";
    removeBtn.className = "em-upload-btn";
    removeBtn.style.background = "#b94a48";
    removeBtn.textContent = "Remove";
    removeBtn.style.display = input.value ? "inline-flex" : "none";

    var status = document.createElement("span");
    status.className = "em-upload-status";

    wrap.appendChild(preview);
    wrap.appendChild(label);
    wrap.appendChild(removeBtn);
    wrap.appendChild(status);
    input.parentNode.insertBefore(wrap, input.nextSibling);

    function setValue(url) {
      input.value = url || "";
      if (url) {
        preview.src = url;
        preview.style.display = "block";
        removeBtn.style.display = "inline-flex";
      } else {
        preview.removeAttribute("src");
        preview.style.display = "none";
        removeBtn.style.display = "none";
      }
    }

    removeBtn.addEventListener("click", function(){
      setValue("");
      status.textContent = "Image removed";
      status.className = "em-upload-status";
    });

    file.addEventListener("change", function(){
      var f = file.files && file.files[0];
      if (!f) return;
      if (f.size > 2*1024*1024) {
        status.textContent = "File too large (max 2 MB)";
        status.className = "em-upload-status is-error";
        return;
      }
      if (!/^image\/(png|jpe?g|webp|gif)$/.test(f.type)) {
        status.textContent = "Unsupported file type";
        status.className = "em-upload-status is-error";
        return;
      }
      status.textContent = "Uploading…";
      status.className = "em-upload-status";
      var fd = new FormData();
      fd.append("file", f);
      fetch("/admin/upload", { method:"POST", body: fd, credentials:"same-origin" })
        .then(function(r){ return r.json().then(function(d){ return {ok:r.ok, d:d}; }); })
        .then(function(res){
          if (!res.ok) throw new Error(res.d.error || "Upload failed");
          // Only accept relative /uploads/ paths returned by our own endpoint
          if (typeof res.d.url !== "string" || !/^\/uploads\/(img\/)?[A-Za-z0-9_.-]+$/.test(res.d.url)) {
            throw new Error("Invalid response");
          }
          setValue(res.d.url);
          status.textContent = "Uploaded ✓";
          status.className = "em-upload-status is-success";
        })
        .catch(function(err){
          status.textContent = err.message || "Upload failed";
          status.className = "em-upload-status is-error";
        });
      file.value = "";
    });
  }
  document.addEventListener("DOMContentLoaded", function(){
    document.querySelectorAll('input[name="image_url"]').forEach(enhance);
  });
})();
</script>
{% endblock %}
