<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Evrest Market</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/mini/style.css" />
</head>
<body>

<div id="app">

  <!-- ── Header ── -->
  <header class="app-header" id="appHeader">
    <div class="header-brand">
      <span class="brand-mark">&#9650;</span>
      <span class="brand-name">Evrest Market</span>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="searchToggleBtn" aria-label="Search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </div>
  </header>

  <!-- ── Main ── -->
  <main id="mainContent">

    <!-- ━━━ SHOP PAGE ━━━ -->
    <div id="pageShop" class="page active">

      <!-- Search bar (collapsed by default) -->
      <div class="search-bar" id="searchBar" style="display:none">
        <div class="search-input-wrap">
          <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" class="search-input" placeholder="Search products…" autocomplete="off" />
          <button class="search-clear" id="searchClear" style="display:none">&#x2715;</button>
        </div>
      </div>

      <!-- Category chips -->
      <div class="category-strip">
        <div class="chips-scroll" id="chipsScroll">
          <button class="chip active" data-category="">All</button>
        </div>
      </div>

      <!-- Product grid -->
      <div id="productGrid" class="product-grid">
        <div class="empty-state" id="gridLoader">
          <div class="spinner"></div>
          <p>Loading products…</p>
        </div>
      </div>

    </div><!-- /pageShop -->

    <!-- ━━━ CART PAGE ━━━ -->
    <div id="pageCart" class="page">
      <div class="page-header"><h2 class="page-title-text">Cart</h2></div>
      <div id="cartList" class="cart-list"></div>
      <div class="cart-summary" id="cartSummary" style="display:none">
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="cartSubtotal">—</span>
        </div>
        <button class="btn-primary full-width" id="checkoutAllBtn">Checkout All</button>
      </div>
    </div>

    <!-- ━━━ ORDERS PAGE ━━━ -->
    <div id="pageOrders" class="page">
      <div class="page-header"><h2 class="page-title-text">My Orders</h2></div>
      <div id="ordersList" class="orders-list">
        <div class="empty-state">
          <div class="spinner"></div>
          <p>Loading…</p>
        </div>
      </div>
    </div>

    <!-- ━━━ PROFILE PAGE ━━━ -->
    <div id="pageProfile" class="page">
      <div class="profile-hero">
        <div class="profile-avatar" id="profileAvatar">?</div>
        <h2 class="profile-name" id="profileName">—</h2>
        <p class="profile-handle" id="profileHandle"></p>
      </div>

      <div class="profile-card">
        <div class="balance-label">Balance</div>
        <div class="balance-value" id="balanceVal">—</div>
        <button class="btn-primary" id="addBalanceBtn">Add Balance via Stars</button>
      </div>

      <div class="settings-card">
        <div class="settings-title">Appearance</div>
        <div class="setting-row">
          <span>Dark Mode</span>
          <label class="toggle">
            <input type="checkbox" id="darkToggle" />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </label>
        </div>
      </div>
    </div>

  </main><!-- /mainContent -->

  <!-- ── Bottom Navigation ── -->
  <nav class="bottom-nav" id="bottomNav">
    <button class="nav-btn active" data-page="shop">
      <svg class="nav-ico" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      <span>Shop</span>
    </button>
    <button class="nav-btn" data-page="cart" id="cartNavBtn">
      <div class="nav-ico-wrap">
        <svg class="nav-ico" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="cart-badge" id="cartBadge" style="display:none">0</span>
      </div>
      <span>Cart</span>
    </button>
    <button class="nav-btn" data-page="orders">
      <svg class="nav-ico" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      <span>Orders</span>
    </button>
    <button class="nav-btn" data-page="profile">
      <svg class="nav-ico" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Profile</span>
    </button>
  </nav>

</div><!-- /app -->

<!-- ── Product Detail Sheet ── -->
<div id="productSheet" class="sheet-overlay" style="display:none" aria-hidden="true">
  <div class="sheet-backdrop" id="sheetBackdrop"></div>
  <div class="sheet" id="sheetContent">
    <div class="sheet-handle"></div>
    <div class="sheet-body" id="sheetBody"></div>
  </div>
</div>

<!-- ── Toast ── -->
<div id="toast" class="toast" aria-live="polite"></div>

<script src="/mini/app.js"></script>
</body>
</html>
