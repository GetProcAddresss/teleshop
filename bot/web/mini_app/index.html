<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#F1ECE2" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0F1422" media="(prefers-color-scheme: dark)" />
  <meta name="color-scheme" content="light dark" />
  <title>Evrest Market</title>
  <link rel="icon" href="/mini/logo.png" />
  <link rel="apple-touch-icon" href="/mini/logo.png" />
  <link rel="manifest" href="/mini/manifest.webmanifest" />
  <link rel="preload" as="image" href="/mini/logo.png" />
  <link rel="stylesheet" href="/mini/style.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<!-- ── Splash screen ── -->
<div id="splash" class="splash" aria-hidden="true">
  <div class="splash-inner">
    <div class="splash-logo-wrap">
      <img class="splash-logo" src="/mini/logo.png" alt="Evrest Market" />
      <div class="splash-ring" aria-hidden="true"></div>
    </div>
    <div class="splash-name">Evrest Market</div>
    <div class="splash-tag">Digital Goods Marketplace</div>
    <div class="splash-bar"><span></span></div>
  </div>
</div>

<div id="app" class="app-shell">

  <!-- ── Header ── -->
  <header class="app-header" id="appHeader">
    <a class="header-brand" href="#/shop" aria-label="Evrest Market — Shop">
      <img id="brandLogo" class="brand-logo" src="/mini/logo.png" alt="" />
      <span class="brand-name">Evrest Market</span>
    </a>
    <div class="header-actions">
      <button class="icon-btn" id="searchToggleBtn" aria-label="Search products" data-tooltip="Search">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <button class="icon-btn" id="themeToggleBtn" aria-label="Toggle theme" data-tooltip="Theme">
        <svg class="icon-sun" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <!-- ── Search drawer ── -->
  <div class="search-drawer" id="searchDrawer" hidden>
    <div class="search-input-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="search" id="searchInput" class="search-input" placeholder="Search products…" autocomplete="off" inputmode="search" />
      <button class="search-clear" id="searchClear" hidden aria-label="Clear search">&#x2715;</button>
    </div>
  </div>

  <!-- ── Main content ── -->
  <main id="mainContent" class="content">

    <!-- SHOP -->
    <section id="pageShop" class="page" aria-labelledby="shopHeading">
      <h1 id="shopHeading" class="visually-hidden">Shop</h1>

      <!-- Category chips -->
      <div class="category-strip" id="categoryStrip">
        <div class="chips-scroll" id="chipsScroll">
          <button class="chip is-active" data-category="">All</button>
        </div>
      </div>

      <!-- Product grid -->
      <div id="productGrid" class="product-grid"></div>
    </section>

    <!-- CART -->
    <section id="pageCart" class="page" aria-labelledby="cartHeading">
      <div class="page-header">
        <h1 id="cartHeading" class="page-title">Your Cart</h1>
      </div>
      <div id="cartList" class="cart-list"></div>
      <div class="cart-summary" id="cartSummary" hidden>
        <div class="summary-row">
          <span class="summary-label">Subtotal</span>
          <span class="summary-value" id="cartSubtotal">—</span>
        </div>
        <button class="btn btn-primary btn-block" id="checkoutAllBtn">Checkout All</button>
      </div>
    </section>

    <!-- ORDERS -->
    <section id="pageOrders" class="page" aria-labelledby="ordersHeading">
      <div class="page-header">
        <h1 id="ordersHeading" class="page-title">Orders</h1>
      </div>
      <div id="ordersList" class="orders-list"></div>
    </section>

    <!-- PROFILE -->
    <section id="pageProfile" class="page" aria-labelledby="profileHeading">
      <h1 id="profileHeading" class="visually-hidden">Profile</h1>

      <div class="profile-hero">
        <div class="profile-avatar" id="profileAvatar" aria-hidden="true">?</div>
        <h2 class="profile-name" id="profileName">—</h2>
        <p class="profile-handle" id="profileHandle"></p>
      </div>

      <div class="balance-card">
        <div class="balance-label">Available Balance</div>
        <div class="balance-value" id="balanceVal">—</div>
        <button class="btn btn-primary btn-block" id="addBalanceBtn">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" aria-hidden="true"><path d="M12 2l2.5 7.5H22l-6 4.5 2.5 8L12 17l-6.5 5L8 14 2 9.5h7.5z"/></svg>
          Top up with Telegram Stars
        </button>
      </div>

      <div class="settings-card">
        <div class="settings-title">Appearance</div>
        <div class="segmented" role="radiogroup" aria-label="Theme">
          <button class="seg-btn" data-theme-mode="auto" role="radio" aria-checked="true">Auto</button>
          <button class="seg-btn" data-theme-mode="light" role="radio" aria-checked="false">Light</button>
          <button class="seg-btn" data-theme-mode="dark" role="radio" aria-checked="false">Dark</button>
        </div>
      </div>

      <div class="settings-card">
        <div class="settings-title">About</div>
        <div class="setting-row">
          <span>Version</span>
          <span class="muted" id="appVersion">2.0.0</span>
        </div>
      </div>
    </section>

  </main>

  <!-- ── Bottom nav ── -->
  <nav class="bottom-nav" id="bottomNav" aria-label="Primary">
    <button class="nav-btn is-active" data-page="shop" aria-label="Shop">
      <svg class="nav-ico" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      <span>Shop</span>
    </button>
    <button class="nav-btn" data-page="cart" aria-label="Cart">
      <span class="nav-ico-wrap">
        <svg class="nav-ico" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="cart-badge" id="cartBadge" hidden>0</span>
      </span>
      <span>Cart</span>
    </button>
    <button class="nav-btn" data-page="orders" aria-label="Orders">
      <svg class="nav-ico" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <span>Orders</span>
    </button>
    <button class="nav-btn" data-page="profile" aria-label="Profile">
      <svg class="nav-ico" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Profile</span>
    </button>
  </nav>
</div>

<!-- ── Sheet ── -->
<div id="sheetOverlay" class="sheet-overlay" hidden aria-hidden="true">
  <div class="sheet-backdrop" id="sheetBackdrop"></div>
  <div class="sheet" id="sheetContent" role="dialog" aria-modal="true">
    <div class="sheet-handle" aria-hidden="true"></div>
    <div class="sheet-body" id="sheetBody"></div>
  </div>
</div>

<!-- ── Toast ── -->
<div id="toast" class="toast" role="status" aria-live="polite"></div>

<!-- ── Offline banner ── -->
<div id="offlineBanner" class="offline-banner" hidden>You're offline — showing cached content.</div>

<script type="module" src="/mini/js/main.js"></script>
</body>
</html>
